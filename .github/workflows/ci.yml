name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt
      - name: Compile
        run: python -m compileall -q services core hooks ui tests main.py plugins bootstrap qt_compat.py
      - name: UTF-8 decode check
        run: >
          python -c "from pathlib import Path;
          roots=[Path(p) for p in ('core','hooks','services','scripts','tests','ui','plugins','bootstrap')]+[Path('main.py'),Path('qt_compat.py'),Path('QuickLauncher.manifest')];
          files=[];
          [files.extend([r] if r.is_file() else list(r.rglob('*'))) for r in roots];
          [p.read_text(encoding='utf-8') for p in files if p.is_file() and p.suffix.lower() in {'.py','.md','.yml','.yaml','.json','.toml','.iss','.bat','.xml','.manifest'}]"
      - name: Release source gate
        run: python scripts/check_release_artifacts.py --source-only
      - name: Lint
        run: >
          python -m ruff check --select F
          services/__init__.py
          services/errors.py
          core/__init__.py
          core/command_risk.py
          core/data_models.py
          core/shortcut_command_exec.py
          core/version.py
          scripts/read_project_version.py
          tests/test_command_risk.py
          tests/test_command_variables.py
          tests/test_data_manager.py
          tests/test_hooks_wrapper.py
          tests/test_release_metadata.py
          tests/test_shortcut_command_exec.py
          ui/config_window/command_dialog.py
      - name: Lint (expanded)
        run: python -m ruff check core/ hooks/ services/ scripts/ tests/ ui/ main.py plugins/ bootstrap/ qt_compat.py
      - name: Format check
        run: python -m ruff format --check core/ hooks/ services/ scripts/ tests/ ui/ main.py plugins/ bootstrap/ qt_compat.py
      - name: Tests
        run: python -m pytest tests/ -q --timeout=10 -x

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  source-gate:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Source release gate
        run: python scripts/release_gate.py --skip-tests --skip-smoke

      - name: Focused tests
        run: >
          python -m pytest
          tests/test_release_gate.py
          tests/test_diagnostics.py
          tests/test_shortcut_health.py
          tests/test_ui_smoke.py
          tests/test_pinyin_search.py
          tests/test_exception_logging_policy.py
          tests/test_popup_search_ui.py
          tests/test_chain_registry_processors.py
          tests/test_processor_loader.py
          tests/test_path_security.py
          tests/test_update_trust.py

      - name: Focused mypy subset
        run: python -m mypy --follow-imports=skip services/update

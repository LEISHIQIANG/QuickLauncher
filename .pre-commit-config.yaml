repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
  - repo: local
    hooks:
      - id: no-silent-exceptions
        name: Reject silent except Exception: pass
        entry: python scripts/check_silent_exceptions.py
        language: python
        types: [python]
        stages: [commit]

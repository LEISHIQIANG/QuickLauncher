[mypy]
python_version = 3.8
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
check_untyped_defs = True
ignore_missing_imports = True
warn_redundant_casts = True
warn_unused_ignores = True
strict_optional = True

[mypy-tests.*]
ignore_errors = True

[mypy-.venv.*]
ignore_errors = True
